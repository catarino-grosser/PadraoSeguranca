
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Operacional - Padrão Segurança</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Animação para piscar a tela quando houver emergência */
        @keyframes piscarVermelho {
            0%, 100% { background-color: rgb(17, 24, 39); } /* gray-900 */
            50% { background-color: rgb(69, 10, 10); } /* red-950 */
        }
        .alerta-ativo {
            animation: piscarVermelho 1.5s infinite;
        }
    </style>
</head>
<body id="body-base" class="bg-gray-900 text-gray-100 h-screen flex flex-col font-sans transition-colors duration-300">

    <!-- Barra de Navegação Superior -->
    <header class="bg-gray-800 border-b border-gray-700 p-4 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
            </svg>
            <div>
                <h1 class="text-2xl font-bold tracking-wide">Padrão <span class="text-blue-500">Segurança</span></h1>
                <p class="text-xs text-gray-400 uppercase tracking-wider">Painel da Base Operacional</p>
            </div>
        </div>
        
        <!-- Botão apenas para teste local -->
        <button onclick="simularAlerta()" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold py-2 px-4 rounded border border-blue-800 transition">
            Simular Novo Alerta
        </button>
    </header>

    <!-- Área de Ocorrências -->
    <main class="flex-grow p-6 overflow-y-auto">
        <div class="flex justify-between items-end mb-6">
            <h2 class="text-xl font-semibold text-gray-300">Ocorrências Ativas</h2>
            <span id="contador-alertas" class="bg-gray-700 text-gray-300 py-1 px-3 rounded-full text-sm font-bold">0</span>
        </div>

        <!-- Container onde os alertas vão aparecer -->
        <div id="container-alertas" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <p id="msg-vazio" class="text-gray-500 italic col-span-full text-center mt-10">
                Nenhum alerta no momento. Monitorando portarias...
            </p>
        </div>
    </main>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, onSnapshot, doc, updateDoc, deleteDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // INSIRA AQUI AS MESMAS CREDENCIAIS DO SEU PROJETO
    const firebaseConfig = {
    apiKey: "AIzaSyAIiqAfdfqEYU2nHR7BnQKddGm8Yz2F1ZM",
    authDomain: "padrao-seguranca.firebaseapp.com",
    projectId: "padrao-seguranca",
    storageBucket: "padrao-seguranca.firebasestorage.app",
    messagingSenderId: "255787773246",
    appId: "1:255787773246:web:3c7d59fd708ce39db2106f"
};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const containerAlertas = document.getElementById('container-alertas');
    const msgVazio = document.getElementById('msg-vazio');
    const bodyBase = document.getElementById('body-base');
    const contadorAlertas = document.getElementById('contador-alertas');

    // Cria uma consulta monitorando a coleção "alertas", ordenando pelos mais recentes
    const consultaAlertas = query(collection(db, "alertas"), orderBy("criadoEm", "desc"));
    
    // Escuta ativa em tempo real
    onSnapshot(consultaAlertas, (snapshot) => {
        containerAlertas.innerHTML = '';
        let totalAlertas = snapshot.size;
        contadorAlertas.textContent = totalAlertas;

        if (totalAlertas === 0) {
            msgVazio.style.display = 'block';
            containerAlertas.appendChild(msgVazio);
            bodyBase.classList.remove('alerta-ativo');
            return;
        }

        msgVazio.style.display = 'none';
        let temAlertaAtivo = false;

        snapshot.forEach((docSnap) => {
            const dados = docSnap.data();
            const id = docSnap.id;
            const card = document.createElement('div');
            
            let horaFormatada = "--:--";
            if (dados.criadoEm) {
                horaFormatada = dados.criadoEm.toDate().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            }

            // Renderiza o card conforme o status registrado na nuvem
            if (dados.status === "ativo") {
                temAlertaAtivo = true;
                card.className = "bg-red-900 border border-red-500 rounded-lg p-5 shadow-[0_0_15px_rgba(220,38,38,0.3)] flex flex-col justify-between";
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-2">
                            <span class="bg-red-600 text-white text-xs font-bold px-2 py-1 rounded uppercase animate-pulse">Urgente</span>
                            <span class="text-gray-300 text-sm">${horaFormatada}</span>
                        </div>
                        <h3 class="text-2xl font-bold text-white mb-1">${dados.posto}</h3>
                        <p class="text-gray-300 text-sm mb-4">Acionamento pelo porteiro: ${dados.porteiro}</p>
                    </div>
                    <div class="flex gap-2 mt-4">
                        <button data-id="${id}" class="btn-assumir flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded transition">
                            Assumir
                        </button>
                    </div>
                `;
            } else if (dados.status === "atendimento") {
                card.className = "bg-gray-800 border border-green-500 rounded-lg p-5 shadow-lg flex flex-col justify-between";
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-2">
                            <span class="bg-green-600 text-white text-xs font-bold px-2 py-1 rounded uppercase">Em Curso</span>
                            <span class="text-gray-300 text-sm">${horaFormatada}</span>
                        </div>
                        <h3 class="text-2xl font-bold text-white mb-1">${dados.posto}</h3>
                        <p class="text-gray-300 text-sm mb-4">Porteiro: ${dados.porteiro}</p>
                    </div>
                    <div class="flex gap-2 mt-4">
                        <button data-id="${id}" class="btn-finalizar flex-1 bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded transition">
                            Finalizar Atendimento
                        </button>
                    </div>
                `;
            }

            containerAlertas.appendChild(card);
        });

        // Liga ou desliga o efeito luminoso piscante na tela inteira
        if (temAlertaAtivo) {
            bodyBase.classList.add('alerta-ativo');
        } else {
            bodyBase.classList.remove('alerta-ativo');
        }
    });

    // Captura os cliques nos botões dos cards dinâmicos
    containerAlertas.addEventListener('click', async (e) => {
        const id = e.target.getAttribute('data-id');
        if (!id) return;

        const docRef = doc(db, "alertas", id);

        if (e.target.classList.contains('btn-assumir')) {
            // Atualiza o status do documento para mudar a visualização na base
            await updateDoc(docRef, { status: "atendimento" });
        }
        
        if (e.target.classList.contains('btn-finalizar')) {
            // Remove o documento do banco de dados quando finalizado
            await deleteDoc(docRef);
        }
    });
</script>

</body>
</html>
