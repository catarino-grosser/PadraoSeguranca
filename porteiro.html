<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Porteiro - Padrão Segurança</title>
    <!-- Importando o Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white h-screen flex flex-col items-center justify-between p-6 font-sans">
    
    <!-- Cabeçalho com o nome da empresa -->
    <header class="w-full text-center mt-6">
        <div class="flex items-center justify-center gap-2 mb-1">
            <!-- Ícone de escudo simples -->
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
            </svg>
            <h1 class="text-3xl font-bold tracking-wide text-gray-100">Padrão <span class="text-blue-500">Segurança</span></h1>
        </div>
        <p class="text-gray-400 mt-2 text-sm uppercase tracking-widest">Central de Alerta • Portaria</p>
    </header>

    <!-- Área principal com o botão de pânico -->
    <main class="flex-grow flex flex-col items-center justify-center w-full">
        <!-- Botão com efeitos de clique e sombra -->
        <button id="btn-panico" class="bg-red-600 hover:bg-red-700 active:bg-red-800 text-white font-bold rounded-full w-64 h-64 shadow-[0_0_50px_rgba(220,38,38,0.4)] flex flex-col items-center justify-center transition-all duration-200 transform active:scale-95 border-4 border-red-800">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-24 w-24 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
            <span id="btn-text" class="text-2xl uppercase tracking-wider">Acionar<br>Alerta</span>
        </button>
        <!-- Mensagem de status dinâmico -->
        <p id="status-msg" class="mt-8 text-lg font-medium text-gray-400 h-6 text-center"></p>
    </main>

    <!-- Rodapé identificando o posto atual -->
    <footer class="w-full text-center mb-2 bg-gray-800 py-3 rounded-xl border border-gray-700">
        <p class="text-gray-400 text-sm">Posto Atual:</p>
        <p class="text-lg font-bold text-gray-200">Condomínio Vale Verde</p>
    </footer>

    <!-- Lógica JavaScript de Interação -->
    <script type="module">
    // Importando as funções necessárias do Firebase via CDN
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // INSIRA AQUI AS SUAS CREDENCIAIS DO FIREBASE
    const firebaseConfig = {
  apiKey: "AIzaSyAIiqAfdfqEYU2nHR7BnQKddGm8Yz2F1ZM",
  authDomain: "padrao-seguranca.firebaseapp.com",
  projectId: "padrao-seguranca",
  storageBucket: "padrao-seguranca.firebasestorage.app",
  messagingSenderId: "255787773246",
  appId: "1:255787773246:web:3c7d59fd708ce39db2106f"
};

    // Inicializando o Firebase e o Banco de Dados
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const btnPanico = document.getElementById('btn-panico');
    const btnText = document.getElementById('btn-text');
    const statusMsg = document.getElementById('status-msg');

    btnPanico.addEventListener('click', async () => {
        // Mudança visual imediata: Estado de "Enviando"
        btnPanico.classList.remove('bg-red-600', 'hover:bg-red-700', 'border-red-800', 'shadow-[0_0_50px_rgba(220,38,38,0.4)]');
        btnPanico.classList.add('bg-yellow-500', 'hover:bg-yellow-600', 'border-yellow-700', 'shadow-[0_0_50px_rgba(234,179,8,0.4)]');
        btnText.innerHTML = "Enviando<br>...";
        statusMsg.textContent = "Conectando com a base motora...";
        statusMsg.className = "mt-8 text-lg font-medium text-yellow-400 h-6 text-center";

        try {
            // Cria um novo documento na coleção "alertas" dentro do Firestore
            await addDoc(collection(db, "alertas"), {
                posto: "Condomínio Vale Verde",
                porteiro: "João Silva",
                status: "ativo", // Status inicial do chamado
                criadoEm: serverTimestamp() // Pega a hora exata do servidor
            });

            // Sucesso no envio: Estado de "Confirmado"
            btnPanico.classList.remove('bg-yellow-500', 'hover:bg-yellow-600', 'border-yellow-700', 'shadow-[0_0_50px_rgba(234,179,8,0.4)]');
            btnPanico.classList.add('bg-green-600', 'hover:bg-green-700', 'border-green-800', 'shadow-[0_0_50px_rgba(22,163,7,0.4)]');
            btnText.innerHTML = "Alerta<br>Enviado!";
            statusMsg.textContent = "Vigilante notificado com sucesso.";
            statusMsg.className = "mt-8 text-lg font-medium text-green-500 h-6 text-center";

            // Retorna o botão ao estado de alerta padrão após 4 segundos
            setTimeout(() => {
                btnPanico.classList.remove('bg-green-600', 'hover:bg-green-700', 'border-green-800', 'shadow-[0_0_50px_rgba(22,163,7,0.4)]');
                btnPanico.classList.add('bg-red-600', 'hover:bg-red-700', 'border-red-800', 'shadow-[0_0_50px_rgba(220,38,38,0.4)]');
                btnText.innerHTML = "Acionar<br>Alerta";
                statusMsg.textContent = "";
            }, 4000);

        } catch (error) {
            console.error("Erro ao enviar dados para a nuvem:", error);
            statusMsg.textContent = "Falha na conexão. Tente novamente.";
            statusMsg.className = "mt-8 text-lg font-medium text-red-500 h-6 text-center";
            
            // Reverte o botão para vermelho para nova tentativa
            btnPanico.className = "bg-red-600 hover:bg-red-700 text-white font-bold rounded-full w-64 h-64 shadow-[0_0_50px_rgba(220,38,38,0.4)] flex flex-col items-center justify-center border-4 border-red-800";
            btnText.innerHTML = "Acionar<br>Alerta";
        }
    });
</script>

</body>
</html>
